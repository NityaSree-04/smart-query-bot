<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Results - Aichatter</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #0a0c10;
            --bg-card: rgba(17, 25, 40, 0.75);
            --primary-blue: #3b82f6;
            --primary-cyan: #06b6d4;
            --text-white: #ffffff;
            --text-gray: #9ca3af;
            --border-glass: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-white);
            margin: 0;
            padding: 2rem;
            min-height: 100vh;
            background-image:
                radial-gradient(circle at 5% 5%, rgba(6, 182, 212, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 95% 95%, rgba(59, 130, 246, 0.1) 0%, transparent 40%);
            background-attachment: fixed;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 {
            font-size: 2rem;
            font-weight: 800;
            margin: 0;
            background: linear-gradient(135deg, #06b6d4, #3b82f6);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stats {
            color: var(--text-gray);
            font-size: 0.9rem;
        }

        .sql-container {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 1rem;
            margin-bottom: 2rem;
            font-family: 'Monaco', 'Consolas', monospace;
            font-size: 0.85rem;
            color: #10b981;
            position: relative;
            overflow: hidden;
        }

        .sql-label {
            display: block;
            font-family: 'Inter', sans-serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-gray);
            margin-bottom: 0.5rem;
            font-weight: 700;
        }

        .sql-code {
            word-break: break-all;
            line-height: 1.5;
        }

        .table-container {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-glass);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            background: rgba(255, 255, 255, 0.05);
            padding: 1.25rem 1rem;
            font-weight: 600;
            color: var(--primary-cyan);
            border-bottom: 1px solid var(--border-glass);
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 1px;
        }

        td {
            padding: 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.85);
        }

        tr:hover td {
            background: rgba(255, 255, 255, 0.02);
            color: var(--text-white);
        }

        .no-data {
            padding: 3rem;
            text-align: center;
            color: var(--text-gray);
        }

        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
            background: rgba(6, 182, 212, 0.1);
            color: var(--primary-cyan);
            border: 1px solid rgba(6, 182, 212, 0.2);
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-glass);
            border-radius: 12px;
            color: var(--text-white);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.3s ease;
            cursor: pointer;
            margin-bottom: 1rem;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--primary-cyan);
            transform: translateX(-5px);
            box-shadow: 0 5px 15px rgba(6, 182, 212, 0.2);
        }
    </style>
</head>

<body>
    <div class="container">
        <button onclick="goBack()" class="back-btn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
            Back to Chat
        </button>
        <header>
            <div>
                <h1>Detailed Results</h1>
                <p id="queryText" class="stats">Showing all results for your query</p>
            </div>
            <div id="resultCount" class="stats"></div>
        </header>

        <div id="sqlBox" class="sql-container" style="display: none;">
            <span class="sql-label">Generated SQL Query</span>
            <code id="sqlCode" class="sql-code"></code>
        </div>

        <div class="table-container">
            <table id="resultsTable">
                <thead>
                    <tr id="tableHeader">
                        <!-- Headers will be injected here -->
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <!-- Body will be injected here -->
                </tbody>
            </table>
            <div id="noData" class="no-data" style="display: none;">
                No results found or data expired.
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const dataString = localStorage.getItem('fullChatResults');
            const query = localStorage.getItem('lastQuery');

            if (!dataString) {
                document.getElementById('noData').style.display = 'block';
                document.getElementById('resultsTable').style.display = 'none';
                return;
            }

            try {
                const results = JSON.parse(dataString);
                const sql = localStorage.getItem('lastSQL');

                if (query) document.getElementById('queryText').innerText = `Results for: "${query}"`;
                document.getElementById('resultCount').innerText = `${results.length} results found`;

                if (sql) {
                    const sqlBox = document.getElementById('sqlBox');
                    const sqlCode = document.getElementById('sqlCode');
                    sqlBox.style.display = 'block';
                    sqlCode.innerText = sql;
                }

                if (results.length === 0) {
                    document.getElementById('noData').style.display = 'block';
                    document.getElementById('resultsTable').style.display = 'none';
                    return;
                }

                // Map cryptic COL IDs to readable names
                const colMap = {
                    'COL 1': 'ID',
                    'COL 2': 'Code',
                    'COL 3': 'College Name',
                    'COL 4': 'Type',
                    'COL 7': 'Place',
                    'COL 8': 'District',
                    'COL 12': 'Branch',
                    'COL 13': 'OC Boys',
                    'COL 14': 'OC Girls',
                    'COL 31': 'Fee'
                };

                // Filter keys: Only show non-empty and useful columns
                const allKeys = Object.keys(results[0]);
                const displayKeys = allKeys.filter(key => {
                    // Check if column is in our map and not empty in first 5 rows
                    return colMap[key] !== undefined;
                });

                // Create Headers
                const headerRow = document.getElementById('tableHeader');
                displayKeys.forEach(key => {
                    const th = document.createElement('th');
                    th.innerText = colMap[key] || key;
                    headerRow.appendChild(th);
                });

                // Create Rows
                const tableBody = document.getElementById('tableBody');
                results.forEach(row => {
                    const tr = document.createElement('tr');
                    displayKeys.forEach(key => {
                        const td = document.createElement('td');
                        let val = row[key];

                        if (key === 'COL 31' && val) val = '₹' + Number(val).toLocaleString();
                        if (key === 'COL 13' || key === 'COL 14') val = val ? Number(val).toLocaleString() : '-';
                        if (key === 'COL 12') td.innerHTML = `<span class="badge">${val}</span>`;
                        else td.innerText = val || '-';

                        tr.appendChild(td);
                    });
                    tableBody.appendChild(tr);
                });

            } catch (e) {
                console.error(e);
                document.getElementById('noData').style.display = 'block';
            }
        });

        function goBack() {
            // If we opened this in a new tab/window, just close it to return to the chat
            if (window.opener || window.history.length > 1) {
                if (window.opener) {
                    window.close();
                } else {
                    window.history.back();
                }
            } else {
                window.location.href = 'index.html';
            }
        }
    </script>
</body>

</html>
